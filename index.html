<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Papers — Curated by tags</title>
  <meta name="description" content="Hugging Face Daily Papers: tag-based browsing + AI reviews (Chinese)" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>AI Papers</h1>
      <p class="tagline">Hugging Face Daily Papers · tag-based browsing · AI review (中文点评)</p>
      <nav class="tabs" role="tablist">
        <button class="tab active" data-view="discover" role="tab">Discover</button>
        <button class="tab" data-view="reviews" role="tab">AI Review</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- Discover view (tag-based) -->
    <section id="view-discover" class="view active">
      <div class="toolbar">
        <label for="date-select">Date</label>
        <select id="date-select" class="date-select"></select>
        <label for="tag-select">Tag</label>
        <select id="tag-select" class="date-select"></select>
        <span id="daily-count" class="meta-badge"></span>
      </div>

      <div id="tag-shelf" class="tag-shelf"></div>
      <div id="discover-list" class="papers-list"></div>
    </section>

    <!-- Reviews view -->
    <section id="view-reviews" class="view">
      <div class="toolbar">
        <label for="review-date-select">Date</label>
        <select id="review-date-select" class="date-select"></select>
        <span id="review-status" class="meta-badge"></span>
      </div>
      <div id="review-panel" class="review-panel"></div>
    </section>

    <div id="loading" class="loading">Loading…</div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Data source:
        <a href="https://huggingface.co/papers" target="_blank" rel="noopener">Hugging Face Daily Papers</a>
        · Generated by
        <a href="https://github.com/aCoder2013/ai-papers-daily" target="_blank" rel="noopener">ai-papers-daily</a>
        · Static hosting on GitHub Pages
      </p>
    </div>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
